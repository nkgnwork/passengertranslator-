<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Hotel Las Vicuñas — Traductor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#DDB888;--gold-light:#E8CFA3;--cream:#FAF6F0;--cream-dark:#F0E8D8;
  --brown:#6B4E35;--brown-dark:#4A3525;--brown-light:#8B6B4E;
  --accent:#C4956A;--white:#FFFFFF;--text:#3A2A1A;
  --success:#5A8F5A;--recording:#C44040;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--cream)}
.screen{display:none;height:100vh;width:100vw;position:absolute;top:0;left:0}
.screen.active{display:flex}

/* ─── WELCOME ─── */
#s-welcome{flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--cream) 0%,var(--cream-dark) 40%,#E8D8C4 100%)}
.welcome-logo{margin-bottom:1.5rem}
.welcome-logo img{max-width:420px;width:80vw;height:auto}
.welcome-subtitle{font-family:'DM Sans',sans-serif;font-size:1.1rem;color:var(--brown-light);
  letter-spacing:0.15em;text-transform:uppercase;margin-bottom:2.5rem}
.welcome-prompt{font-size:1.3rem;color:var(--brown);margin-bottom:1.5rem;font-weight:500}
.lang-grid{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;max-width:700px}
.lang-btn{display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  padding:1.2rem 1.8rem;border-radius:16px;border:2px solid transparent;
  background:var(--white);cursor:pointer;transition:all 0.2s;
  box-shadow:0 2px 8px rgba(107,78,53,0.08);min-width:100px}
.lang-btn:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px rgba(107,78,53,0.15)}
.lang-btn .flag{font-size:2.5rem;line-height:1}
.lang-btn .label{font-size:0.85rem;color:var(--brown);font-weight:500}

/* ─── MAIN ─── */
#s-main{flex-direction:column;
  background:linear-gradient(170deg,var(--cream) 0%,#F5EDE0 50%,var(--cream-dark) 100%)}
.top-bar{display:flex;align-items:center;justify-content:space-between;
  padding:0.6rem 1.5rem;background:var(--brown-dark);color:var(--gold);
  box-shadow:0 2px 12px rgba(0,0,0,0.2);z-index:10}
.top-bar-left{display:flex;align-items:center;gap:0.8rem}
.top-bar-left img{height:40px;width:auto}
.top-bar-right{display:flex;align-items:center;gap:1rem}
.top-bar-lang{display:flex;align-items:center;gap:0.4rem;
  padding:0.4rem 0.8rem;border-radius:8px;background:rgba(221,184,136,0.15);
  font-size:0.95rem;cursor:pointer;transition:background 0.2s}
.top-bar-lang:hover{background:rgba(221,184,136,0.3)}
.top-bar-lang .flag{font-size:1.3rem}
.btn-icon{background:none;border:none;color:var(--gold);font-size:1.3rem;
  cursor:pointer;padding:0.3rem;opacity:0.7;transition:opacity 0.2s}
.btn-icon:hover{opacity:1}
.api-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.api-dot.ok{background:var(--success);box-shadow:0 0 6px var(--success)}
.api-dot.err{background:var(--recording);box-shadow:0 0 6px var(--recording)}

/* Translation display */
.trans-area{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:1.5rem 2.5rem;gap:1.2rem;overflow:hidden}
.trans-block{width:100%;max-width:1200px;border-radius:20px;padding:1.8rem 2.5rem;
  text-align:center;animation:fadeUp 0.4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.trans-block.orig{background:var(--white);border:2px solid rgba(221,184,136,0.3);
  box-shadow:0 4px 20px rgba(107,78,53,0.06)}
.trans-block.dest{background:linear-gradient(135deg,var(--brown-dark) 0%,var(--brown) 100%);
  box-shadow:0 4px 24px rgba(74,53,37,0.2)}
.trans-lbl{font-size:0.85rem;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.5rem;font-weight:600}
.trans-block.orig .trans-lbl{color:var(--brown-light)}
.trans-block.dest .trans-lbl{color:var(--accent);opacity:0.8}
.trans-txt{font-family:'Playfair Display',serif;font-weight:600;line-height:1.3;word-wrap:break-word;
  font-size:clamp(1.6rem,4vw,3.2rem)}
.trans-block.orig .trans-txt{color:var(--text)}
.trans-block.dest .trans-txt{color:var(--cream)}
.trans-empty{text-align:center;color:var(--brown-light);font-size:1.1rem;font-style:italic;opacity:0.5}

/* Input bar - TWO MIC BUTTONS */
.input-bar{display:flex;align-items:center;gap:0.6rem;
  padding:0.7rem 1rem;background:var(--white);border-top:2px solid rgba(221,184,136,0.2)}
.input-field{flex:1;padding:0.7rem 1rem;border:2px solid var(--cream-dark);border-radius:12px;
  font-size:1rem;font-family:'DM Sans',sans-serif;outline:none;
  background:var(--cream);color:var(--text);transition:border-color 0.2s}
.input-field:focus{border-color:var(--gold)}
.btn-send{padding:0.7rem 1.2rem;border:none;border-radius:12px;
  background:var(--brown-dark);color:var(--gold);font-size:0.95rem;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-send:disabled{opacity:0.4;cursor:default}
.btn-mic{display:flex;align-items:center;gap:0.3rem;
  padding:0.5rem 0.8rem;border-radius:28px;border:3px solid var(--brown-dark);
  background:var(--cream);color:var(--brown-dark);font-size:0.9rem;font-weight:600;
  cursor:pointer;transition:all 0.2s;flex-shrink:0;min-width:80px;justify-content:center}
.btn-mic:hover{background:var(--gold);border-color:var(--gold);color:var(--white)}
.btn-mic.recording{background:var(--recording);border-color:var(--recording);color:white;animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.btn-mic .mic-flag{font-size:1.2rem}
.btn-speak{width:40px;height:40px;border-radius:50%;border:2px solid var(--gold);
  background:transparent;color:var(--gold);font-size:1.1rem;cursor:pointer;flex-shrink:0}
.btn-speak:hover{background:var(--gold);color:var(--white)}

/* ─── GUEST SCREEN ─── */
#s-guest{flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(170deg,var(--cream) 0%,#F5EDE0 60%,var(--cream-dark) 100%);
  padding:3rem;text-align:center}
.guest-header{margin-bottom:2rem}
.guest-header img{max-width:300px;width:60vw;height:auto;opacity:0.7}
.guest-lang-badge{display:inline-flex;align-items:center;gap:0.5rem;
  padding:0.4rem 1.2rem;border-radius:20px;background:rgba(221,184,136,0.2);
  color:var(--brown);font-size:1rem;margin-top:0.5rem}
.guest-box{width:100%;max-width:1100px;border-radius:24px;padding:3rem;
  background:linear-gradient(135deg,var(--brown-dark) 0%,var(--brown) 100%);
  box-shadow:0 8px 40px rgba(74,53,37,0.2);min-height:200px;
  display:flex;flex-direction:column;align-items:center;justify-content:center}
.guest-txt{font-family:'Playfair Display',serif;font-weight:700;color:var(--cream);line-height:1.25;
  word-wrap:break-word;font-size:clamp(2.2rem,5.5vw,4.5rem)}
.guest-idle{color:var(--accent);font-size:1.2rem;font-style:italic;opacity:0.6}
.guest-lbl{font-size:0.9rem;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--accent);margin-bottom:1rem;opacity:0.7}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(58,42,26,0.5);
  z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:20px;padding:2rem;width:90%;max-width:440px;
  box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.modal h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--brown-dark);margin-bottom:1.5rem}
.modal label{font-size:0.9rem;color:var(--brown);font-weight:500;display:block;margin-bottom:0.4rem}
.modal input{width:100%;padding:0.7rem 1rem;border:2px solid var(--cream-dark);border-radius:10px;
  font-size:0.95rem;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:1rem}
.modal input:focus{border-color:var(--gold)}
.modal-btns{display:flex;gap:0.8rem;justify-content:flex-end;margin-top:0.5rem}
.modal-btns button{padding:0.6rem 1.2rem;border-radius:10px;border:none;font-size:0.95rem;
  font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-pri{background:var(--brown-dark);color:var(--gold)}
.btn-sec{background:var(--cream-dark);color:var(--brown)}
.btn-corner{background:none;border:2px solid var(--gold);color:var(--gold);
  padding:0.5rem 1.2rem;border-radius:10px;font-size:0.9rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-weight:500;position:fixed;top:1rem;right:1rem}
.btn-corner:hover{background:var(--gold);color:var(--brown-dark)}

/* Toast & Loading */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--brown-dark);color:var(--cream);padding:0.8rem 1.5rem;
  border-radius:12px;font-size:0.95rem;z-index:200;transition:transform 0.3s ease;
  pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.toast.show{transform:translateX(-50%) translateY(0)}
.ldots{display:inline-flex;gap:6px;align-items:center}
.ldots span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:dp 1.2s ease infinite}
.ldots span:nth-child(2){animation-delay:0.2s}
.ldots span:nth-child(3){animation-delay:0.4s}
@keyframes dp{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.1)}}

@media(max-width:768px){
  .trans-txt{font-size:clamp(1.2rem,3.5vw,1.8rem)!important}
  .guest-txt{font-size:clamp(1.6rem,4.5vw,2.8rem)!important}
  .trans-area{padding:1rem}
  .btn-mic{min-width:60px;font-size:0.8rem}
}
</style>
</head>
<body>

<!-- WELCOME -->
<div class="screen active" id="s-welcome">
  <div class="welcome-logo"><img id="wLogo" alt="Hotel Las Vicuñas"></div>
  <div class="welcome-subtitle">Traductor de Recepción</div>
  <div class="welcome-prompt">Seleccione el idioma del pasajero</div>
  <div class="lang-grid" id="langGrid"></div>
  <button class="btn-corner" onclick="openSettings()">⚙ API Key</button>
</div>

<!-- MAIN -->
<div class="screen" id="s-main">
  <div class="top-bar">
    <div class="top-bar-left"><img id="hLogo" alt="Las Vicuñas"></div>
    <div class="top-bar-right">
      <div class="top-bar-lang" id="topLang" onclick="goBack()" title="Cambiar idioma"></div>
      <span class="api-dot" id="apiDot"></span>
      <button class="btn-icon" onclick="openSettings()" title="Ajustes">⚙</button>
    </div>
  </div>
  <div class="trans-area" id="transArea">
    <div class="trans-empty" id="transEmpty">Presione un micrófono o escriba para traducir</div>
    <div class="trans-block orig" id="bOrig" style="display:none">
      <div class="trans-lbl" id="origLbl">Español</div>
      <div class="trans-txt" id="origTxt"></div>
    </div>
    <div class="trans-block dest" id="bDest" style="display:none">
      <div class="trans-lbl" id="destLbl">Traducción</div>
      <div class="trans-txt" id="destTxt"></div>
    </div>
  </div>
  <div class="input-bar">
    <button class="btn-mic" id="micEs" onclick="toggleMic('es')" title="Yo hablo (Español)">
      <span class="mic-flag">🇨🇱</span> 🎤
    </button>
    <button class="btn-mic" id="micGuest" onclick="toggleMic('guest')" title="Pasajero habla">
      <span class="mic-flag" id="micGuestFlag"></span> 🎤
    </button>
    <input type="text" class="input-field" id="inp" placeholder="Escriba aquí..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="btn-send" id="btnSend" onclick="sendMsg()">Traducir</button>
    <button class="btn-speak" id="btnSpk" onclick="speakLast()" title="Escuchar" style="display:none">🔊</button>
  </div>
</div>

<!-- GUEST -->
<div class="screen" id="s-guest">
  <div class="guest-header">
    <img id="gLogo" alt="Hotel Las Vicuñas">
    <div class="guest-lang-badge" id="gBadge"></div>
  </div>
  <div class="guest-box" id="gBox">
    <div class="guest-idle" id="gIdle">Bienvenido · Welcome · Willkommen</div>
    <div class="guest-lbl" id="gLbl" style="display:none"></div>
    <div class="guest-txt" id="gTxt" style="display:none"></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h2>⚙ Configuración</h2>
    <label>Anthropic API Key</label>
    <input type="password" id="apiInp" placeholder="sk-ant-...">
    <div class="modal-btns">
      <button class="btn-sec" onclick="closeSettings()">Cancelar</button>
      <button class="btn-pri" onclick="saveSettings()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const LANGS = [
  {code:'en',label:'English',flag:'🇬🇧',speech:'en-US'},
  {code:'de',label:'Deutsch',flag:'🇩🇪',speech:'de-DE'},
  {code:'fr',label:'Français',flag:'🇫🇷',speech:'fr-FR'},
  {code:'pt',label:'Português',flag:'🇧🇷',speech:'pt-BR'},
  {code:'ja',label:'日本語',flag:'🇯🇵',speech:'ja-JP'},
  {code:'zh',label:'中文',flag:'🇨🇳',speech:'zh-CN'},
  {code:'ko',label:'한국어',flag:'🇰🇷',speech:'ko-KR'},
];

let apiKey='', gLang=null, listening=false, recog=null, lastTr=null, isGuest=false;
const $=id=>document.getElementById(id);

function init(){
  const p=new URLSearchParams(location.search);
  isGuest=p.get('screen')==='guest';
  try{apiKey=localStorage.getItem('hlv_tkey')||'';}catch(e){}

  // Set logos
  $('wLogo').src=LOGO_WELCOME;
  $('hLogo').src=LOGO_HEADER;
  $('gLogo').src=LOGO_WELCOME;

  if(isGuest){show('s-guest');startGuestPoll();return;}

  LANGS.forEach(l=>{
    const b=document.createElement('div');
    b.className='lang-btn';
    b.innerHTML=`<span class="flag">${l.flag}</span><span class="label">${l.label}</span>`;
    b.onclick=()=>selectLang(l);
    $('langGrid').appendChild(b);
  });
  updDot();
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');}

function selectLang(l){
  gLang=l;
  try{localStorage.setItem('hlv_glang',JSON.stringify(l));localStorage.setItem('hlv_lang_sync',JSON.stringify(l));}catch(e){}
  enterMain();
}

function enterMain(){
  show('s-main');
  $('topLang').innerHTML=`<span class="flag">${gLang.flag}</span> ${gLang.label}`;
  $('micGuestFlag').textContent=gLang.flag;
  updDot();
  $('inp').focus();
}

function goBack(){show('s-welcome');try{localStorage.removeItem('hlv_glang');}catch(e){}}

function openSettings(){$('apiInp').value=apiKey;$('settingsModal').classList.add('show');}
function closeSettings(){$('settingsModal').classList.remove('show');}
function saveSettings(){
  apiKey=$('apiInp').value.trim();
  try{localStorage.setItem('hlv_tkey',apiKey);}catch(e){}
  closeSettings();updDot();toast('API Key guardada');
}
function updDot(){const d=$('apiDot');if(!d)return;d.className=apiKey?'api-dot ok':'api-dot err';}

// ─── TRANSLATE ───
async function translate(text){
  if(!apiKey){toast('Configure API Key ⚙');return null;}
  if(!gLang)return null;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:1024,
        system:`You are a hotel reception translator at Hotel Las Vicuñas in Putre, Chile (3,500m altitude, Altiplano).
The two active languages are: Spanish (es) and ${gLang.label} (${gLang.code}).
Rules:
1. If input is Spanish → translate to ${gLang.label}
2. If input is ${gLang.label} → translate to Spanish  
3. If input is another language → translate to both Spanish and ${gLang.label}, separated by " / "
4. Keep translations natural, warm, hotel-appropriate.
5. Respond ONLY with JSON, no markdown: {"detected":"<lang code>","detected_name":"<lang name>","translation":"<text>","target":"<target code>","target_name":"<target name>"}`,
        messages:[{role:'user',content:text}]
      })
    });
    if(!r.ok){toast('Error API: '+r.status);return null;}
    const d=await r.json();
    const raw=d.content?.[0]?.text||'';
    try{return JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch(e){return{detected:'??',detected_name:'Auto',translation:raw,target:gLang.code,target_name:gLang.label};}
  }catch(e){toast('Error de conexión');return null;}
}

// ─── SEND ───
async function sendMsg(){
  const text=$('inp').value.trim();
  if(!text)return;
  $('inp').value='';$('btnSend').disabled=true;
  $('transEmpty').style.display='none';
  $('bOrig').style.display='';$('origLbl').textContent='⏳ Detectando...';$('origTxt').textContent=text;
  $('bDest').style.display='';$('destLbl').textContent='Traduciendo';
  $('destTxt').innerHTML='<span class="ldots"><span></span><span></span><span></span></span>';
  const res=await translate(text);
  if(res){
    const df=LANGS.find(l=>l.code===res.detected)?.flag||'🌐';
    const tf=LANGS.find(l=>l.code===res.target)?.flag||(res.target==='es'?'🇨🇱':gLang.flag);
    $('origLbl').textContent=`${df} ${res.detected_name||res.detected}`;
    $('destLbl').textContent=`${tf} ${res.target_name||res.target}`;
    $('destTxt').textContent=res.translation;
    const sl=res.target==='es'?'es-CL':(LANGS.find(l=>l.code===res.target)?.speech||'en-US');
    lastTr={text:res.translation,lang:sl};
    $('btnSpk').style.display='';
    speak(res.translation,sl);
    broadcast(res);
  }else{$('destTxt').textContent='Error al traducir';$('destLbl').textContent='⚠️';}
  $('btnSend').disabled=false;
}

function broadcast(res){
  const tf=LANGS.find(l=>l.code===res.target)?.flag||(res.target==='es'?'🇨🇱':gLang.flag);
  const sl=res.target==='es'?'es-CL':(LANGS.find(l=>l.code===res.target)?.speech||'en-US');
  try{localStorage.setItem('hlv_latest',JSON.stringify({
    text:res.translation,label:`${tf} ${res.target_name||''}`,lang:sl,ts:Date.now()
  }));}catch(e){}
}

// ─── SPEECH RECOGNITION (two buttons) ───
function toggleMic(who){
  if(listening){stopMic();return;}
  if(!('SpeechRecognition' in window||'webkitSpeechRecognition' in window)){toast('Usa Chrome');return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR();
  // KEY: set correct language for accurate transcription
  recog.lang = who==='es' ? 'es-CL' : gLang.speech;
  recog.continuous=false;recog.interimResults=true;
  const btn = who==='es' ? $('micEs') : $('micGuest');
  const lbl = who==='es' ? '🇨🇱 Escuchando...' : `${gLang.flag} Escuchando...`;
  recog.onstart=()=>{listening=true;btn.classList.add('recording');$('inp').placeholder=lbl;};
  recog.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    $('inp').value=final||interim;
    if(final){stopMic();sendMsg();}
  };
  recog.onerror=(e)=>{stopMic();if(e.error!=='no-speech'&&e.error!=='aborted')toast('Mic: '+e.error);};
  recog.onend=()=>{if(listening)stopMic();};
  recog.start();
}

function stopMic(){
  listening=false;
  $('micEs').classList.remove('recording');
  $('micGuest').classList.remove('recording');
  $('inp').placeholder='Escriba aquí...';
  if(recog){try{recog.stop();}catch(e){}recog=null;}
}

// ─── TTS ───
function speak(t,l){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang=l;u.rate=0.9;
  const v=window.speechSynthesis.getVoices();
  const m=v.find(x=>x.lang.startsWith(l.split('-')[0]));
  if(m)u.voice=m;
  window.speechSynthesis.speak(u);
}
function speakLast(){if(lastTr)speak(lastTr.text,lastTr.lang);}

// ─── GUEST POLLING ───
function startGuestPoll(){
  let lastTs=0;
  try{const ls=localStorage.getItem('hlv_lang_sync');
    if(ls){const l=JSON.parse(ls);$('gBadge').textContent=`${l.flag} ${l.label}`;}}catch(e){}
  setInterval(()=>{
    try{
      const r=localStorage.getItem('hlv_latest');
      if(r){const d=JSON.parse(r);
        if(d.ts&&d.ts>lastTs){lastTs=d.ts;
          $('gIdle').style.display='none';$('gLbl').style.display='';$('gTxt').style.display='';
          $('gLbl').textContent=d.label||'';$('gTxt').textContent=d.text||'';
          speak(d.text,d.lang);
          setTimeout(()=>{if(lastTs===d.ts){$('gIdle').style.display='';$('gLbl').style.display='none';$('gTxt').style.display='none';}},60000);
        }
      }
    }catch(e){}
    try{const ls=localStorage.getItem('hlv_lang_sync');
      if(ls){const l=JSON.parse(ls);$('gBadge').textContent=`${l.flag} ${l.label}`;}}catch(e){}
  },400);
}

function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

window.addEventListener('DOMContentLoaded',init);
if(window.speechSynthesis)window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
</script>
